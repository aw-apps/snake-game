<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="card">
    <h1>Snake</h1>
    <div class="hud">
      <span>Score: <span id="score-value">0</span></span>
      <span>Best: <span id="highscore-value">0</span></span>
      <span>Status: <span id="status-value">Running</span></span>
    </div>
    <canvas id="game" aria-label="Snake game board"></canvas>
    <div class="controls">
      <button id="pause-btn">Pause</button>
      <button id="restart-btn">Restart</button>
    </div>
    <div class="touch-controls">
      <span></span>
      <button data-dir="up">▲</button>
      <span></span>
      <button data-dir="left">◀</button>
      <button data-dir="down">▼</button>
      <button data-dir="right">▶</button>
    </div>
  </div>
  <script type="module" src="./snake-game.js"></script>
</body>
</html>
